<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFORA API Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6C63FF 0%, #FF6584 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #6C63FF;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #7F8C8D;
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: #F5F7FA;
            color: #7F8C8D;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, #6C63FF, #8B7FFF);
            color: white;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #2C3E50;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #6C63FF;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6C63FF, #8B7FFF);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .response {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .response.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }
        .response.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }
        .response pre {
            margin-top: 10px;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 SAFORA API Tester</h1>
        <p class="subtitle">Test your backend APIs</p>

        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">Login</button>
            <button class="tab" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="test@example.com" value="test@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="password123" value="password123">
            </div>
            <button onclick="testLogin()">Login</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="registerName" placeholder="John Doe" value="Test User">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="registerEmail" placeholder="test@example.com" value="test@example.com">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="registerPhone" placeholder="+923001234567" value="+923001234567">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="registerPassword" placeholder="password123" value="password123">
            </div>
            <button onclick="testRegister()">Register</button>
        </div>

        <div id="response" class="response"></div>
    </div>

    <script>
        const API_URL = 'http://192.168.247.1:5000/api';

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
            hideResponse();
        }

        function showResponse(success, message, data) {
            const responseDiv = document.getElementById('response');
            responseDiv.className = 'response ' + (success ? 'success' : 'error');
            responseDiv.innerHTML = `
                <strong>${success ? '✅ Success!' : '❌ Error'}</strong>
                <p>${message}</p>
                ${data ? `<pre>${JSON.stringify(data, null, 2)}</pre>` : ''}
            `;
            responseDiv.style.display = 'block';
        }

        function hideResponse() {
            document.getElementById('response').style.display = 'none';
        }

        async function testLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showResponse(true, 'Login successful!', data);
                } else {
                    showResponse(false, data.message || 'Login failed', data);
                }
            } catch (error) {
                showResponse(false, 'Network error: ' + error.message);
            }
        }

        async function testRegister() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const phone = document.getElementById('registerPhone').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        phone,
                        password,
                        role: 'passenger'
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showResponse(true, 'Registration successful!', data);
                } else {
                    showResponse(false, data.message || 'Registration failed', data);
                }
            } catch (error) {
                showResponse(false, 'Network error: ' + error.message);
            }
        }
    </script>
</body>
</html>
